# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build and test (legacy manual)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'sapmachine'
        cache: maven
    - name: Install Parent POM
      run: mvn -N -f pom.docker.xml install -q
    - name: Build and test with Maven
      run: |
        mvn -f performance/pom.xml clean install -DskipTests -q
        mvn -f backend/pom.xml clean install -q
    # For now, the backend jar is not reused in subsequent steps
    # - name: Upload .jar file
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: TAF backend package
    #     path: backend/target/taf-backend-1.0.0-SNAPSHOT.jar
  
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install Chrome Headless
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps
      - name: Test
        working-directory: ./frontend
        run: npm run test
      - name: Build
        if: always()
        working-directory: ./frontend
        run: npm run build
