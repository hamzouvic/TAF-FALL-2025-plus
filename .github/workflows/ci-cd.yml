name: CI/CD Pipeline - Build, Test, Quality & Documentation

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
    types:
      - opened
      - reopened
      - synchronize
      - edited
  workflow_dispatch:

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: "-Xmx1024m"
  NODE_OPTIONS: "--max-old-space-size=4096"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ============================================================================
  # Backend: Build, Lint, Test, Coverage
  # ============================================================================
  backend:
    runs-on: ubuntu-latest
    name: Backend (Java/Maven)
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for SonarCloud analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'sapmachine'
          cache: maven

      - name: Install Parent POM
        run: mvn -N -f pom.docker.xml install -q

      - name: Build Performance Artifacts Required by Backend
        run: mvn -f performance/pom.xml clean install -DskipTests -q

      - name: Build Backend (without tests)
        working-directory: ./backend
        run: mvn clean compile -DskipTests -q

      - name: Lint with Checkstyle
        working-directory: ./backend
        run: mvn checkstyle:check -q || true  # Don't fail build on style issues for now
        continue-on-error: true

      - name: Run PMD Analysis
        working-directory: ./backend
        run: mvn pmd:check -q || true
        continue-on-error: true

      - name: Unit Tests
        working-directory: ./backend
        run: mvn test -q
        env:
          API_TEST_TOKEN: test-secret-for-ci-only
          API_TEST_EXP_TIME: 3600000
          API_TEST_URL: http://localhost
          API_TEST_PORT: 8080
          SELENIUM_URL: http://localhost
          SELENIUM_PORT: 4444
          EUREKA_CLIENT_ENABLED: false

      - name: Integration Tests
        working-directory: ./backend
        run: mvn failsafe:integration-test -q || true
        env:
          API_TEST_TOKEN: test-secret-for-ci-only
          API_TEST_EXP_TIME: 3600000
          API_TEST_URL: http://localhost
          API_TEST_PORT: 8080
          SELENIUM_URL: http://localhost
          SELENIUM_PORT: 4444
          EUREKA_CLIENT_ENABLED: false

      - name: Generate JaCoCo Coverage Report
        working-directory: ./backend
        run: mvn jacoco:report -q

      - name: Archive Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 5
          if-no-files-found: ignore

      - name: Archive Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================================
  # Frontend: Build, Lint, Test, Coverage
  # ============================================================================
  frontend:
    runs-on: ubuntu-latest
    name: Frontend (Angular)
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Chrome Headless
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Lint with ESLint
        working-directory: ./frontend
        run: npm run lint -- --format json > eslint-report.json 2>&1 || true
        continue-on-error: true

      - name: Format Check with Prettier
        working-directory: ./frontend
        run: npm run format:check || true
        continue-on-error: true

      - name: Build Angular Project
        working-directory: ./frontend
        run: npm run build

      - name: Run Unit Tests with Coverage
        working-directory: ./frontend
        run: npm run test -- --watch=false --code-coverage
        env:
          CI: 'true'

      - name: Archive Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 5
          if-no-files-found: ignore

      - name: Archive Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================================
  # Performance Tests: Build, Lint, Test
  # ============================================================================
  performance:
    runs-on: ubuntu-latest
    name: Performance Tests (Maven)
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'sapmachine'
          cache: maven

      - name: Install Parent POM
        run: mvn -N -f pom.docker.xml install -q

      - name: Build Performance Modules (without tests)
        working-directory: ./performance
        run: mvn clean compile -DskipTests -q

      - name: Lint with Checkstyle
        working-directory: ./performance
        run: mvn checkstyle:check -q || true
        continue-on-error: true

      - name: Run PMD Analysis
        working-directory: ./performance
        run: mvn pmd:check -q || true
        continue-on-error: true

      - name: Run Performance Tests
        working-directory: ./performance
        run: mvn test -q || true

      - name: Generate Coverage Report
        working-directory: ./performance
        run: mvn jacoco:report -q || true

      - name: Archive Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: performance-coverage
          path: performance/target/site/jacoco/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================================
  # Python Test Generation Service: Build, Lint, Test
  # ============================================================================
  test-generation-service:
    runs-on: ubuntu-latest
    name: Test Generation Service (Python)
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./test-generation-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        working-directory: ./test-generation-service
        run: flake8 app --count --statistics || true
        continue-on-error: true

      - name: Format Check with black
        working-directory: ./test-generation-service
        run: black --check app || true
        continue-on-error: true

      - name: Type Check with mypy
        working-directory: ./test-generation-service
        run: mypy app --ignore-missing-imports || true
        continue-on-error: true

      - name: Run pytest with Coverage
        working-directory: ./test-generation-service
        run: pytest --cov=app --cov-report=xml --cov-report=html || true
        continue-on-error: true

      - name: Archive Python Coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: test-generation-coverage-xml
          path: test-generation-service/coverage.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Archive Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: test-generation-coverage
          path: test-generation-service/htmlcov/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================================
  # Quality Gate: SonarCloud Analysis (runs after tests complete)
  # ============================================================================
  sonarcloud:
    needs: [ backend, frontend, performance, test-generation-service ]
    runs-on: ubuntu-latest
    name: SonarCloud Quality Gate (main only)
    if: github.ref == 'refs/heads/main' && always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for SonarCloud analysis

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Validate Sonar token
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "SONAR_TOKEN is missing. Add it in GitHub -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Validate Sonar project access
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          PROJECT_KEY=$(grep '^sonar.projectKey=' sonar-project.properties | cut -d'=' -f2)
          ORG_KEY=$(grep '^sonar.organization=' sonar-project.properties | cut -d'=' -f2)

          echo "Checking Sonar project access for key: ${PROJECT_KEY} (org: ${ORG_KEY})"

          HTTP_CODE=$(curl -sS -o /tmp/sonar_projects.json -w "%{http_code}" \
            -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/projects/search?organization=${ORG_KEY}&projects=${PROJECT_KEY}")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "SonarCloud API request failed with HTTP ${HTTP_CODE}."
            cat /tmp/sonar_projects.json || true
            exit 1
          fi

          if ! grep -q '"key":"'"${PROJECT_KEY}"'"' /tmp/sonar_projects.json; then
            echo "Project key ${PROJECT_KEY} is not visible to this SONAR_TOKEN in org ${ORG_KEY}."
            echo "Either the project does not exist, or the token user lacks permissions."
            cat /tmp/sonar_projects.json
            exit 1
          fi

          echo "Sonar project access confirmed."

      - name: Prepare coverage reports for SonarScanner
        run: |
          mkdir -p backend/target/site/jacoco
          mkdir -p performance/target/site/jacoco
          mkdir -p frontend/coverage
          mkdir -p test-generation-service

          if [ -f artifacts/backend-coverage/jacoco.xml ]; then
            cp artifacts/backend-coverage/jacoco.xml backend/target/site/jacoco/jacoco.xml
          fi

          if [ -f artifacts/performance-coverage/jacoco.xml ]; then
            cp artifacts/performance-coverage/jacoco.xml performance/target/site/jacoco/jacoco.xml
          fi

          if [ -d artifacts/frontend-coverage ]; then
            cp -r artifacts/frontend-coverage/* frontend/coverage/ || true
          fi

          if [ -f artifacts/test-generation-coverage-xml/coverage.xml ]; then
            cp artifacts/test-generation-coverage-xml/coverage.xml test-generation-service/coverage.xml
          fi

      - name: Set up JDK 17 (for SonarCloud)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'sapmachine'

      - name: Build Java bytecode for Sonar
        run: |
          mvn -N -f pom.docker.xml install -q
          mvn -f performance/pom.xml clean install -DskipTests -q
          mvn -f backend/pom.xml clean compile -DskipTests -q

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Echo SonarCloud analysis links
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Sonar project: HamzaAfif_TAF-FALL-2025"
          echo "Main dashboard: https://sonarcloud.io/project/overview?id=HamzaAfif_TAF-FALL-2025"
          echo "Current branch dashboard: https://sonarcloud.io/dashboard?id=HamzaAfif_TAF-FALL-2025&branch=${GITHUB_REF_NAME}"

          if [ -f .scannerwork/report-task.txt ]; then
            echo "report-task.txt found:"
            cat .scannerwork/report-task.txt

            CE_TASK_URL=$(grep '^ceTaskUrl=' .scannerwork/report-task.txt | cut -d'=' -f2-)
            if [ -n "$CE_TASK_URL" ]; then
              echo "Polling CE task until processing completes..."
              STATUS="PENDING"
              for i in $(seq 1 30); do
                curl -sS -u "${SONAR_TOKEN}:" "$CE_TASK_URL" -o /tmp/ce_task.json
                STATUS=$(grep -o '"status":"[^"]*"' /tmp/ce_task.json | head -1 | cut -d':' -f2 | tr -d '"')
                echo "CE task attempt ${i}: ${STATUS}"
                if [ "$STATUS" = "SUCCESS" ] || [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
                  break
                fi
                sleep 5
              done

              echo "Final CE task payload:"
              cat /tmp/ce_task.json

              COMPONENT_KEY=$(grep -o '"componentKey":"[^"]*"' /tmp/ce_task.json | head -1 | cut -d':' -f2 | tr -d '"')
              ANALYSIS_ID=$(grep -o '"analysisId":"[^"]*"' /tmp/ce_task.json | head -1 | cut -d':' -f2 | tr -d '"')

              if [ -n "$COMPONENT_KEY" ]; then
                echo "Resolved componentKey: ${COMPONENT_KEY}"
                echo "Resolved project dashboard: https://sonarcloud.io/project/overview?id=${COMPONENT_KEY}"
                echo "Resolved branch dashboard: https://sonarcloud.io/dashboard?id=${COMPONENT_KEY}&branch=${GITHUB_REF_NAME}"
              fi

              if [ -n "$ANALYSIS_ID" ]; then
                echo "Analysis API URL: https://sonarcloud.io/api/project_analyses/show?analysis=${ANALYSIS_ID}"
              fi

              if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
                echo "Sonar report upload succeeded but processing failed (${STATUS})."
                echo "Check CE payload above for the exact rejection reason."
                exit 1
              fi
            fi
          else
            echo "No .scannerwork/report-task.txt found in workspace."
          fi

  # ============================================================================
  # Reporting: Aggregate and summarize test results
  # ============================================================================
  reporting:
    needs: [ backend, frontend, performance, test-generation-service ]
    runs-on: ubuntu-latest
    name: Test Reports Aggregation
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-reports/

      - name: Generate Summary Report
        run: |
          echo "# CI/CD Test Results Summary" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: ${{ needs.backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: ${{ needs.frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Performance**: ${{ needs.performance.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Generation Service**: ${{ needs.test-generation-service.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts Available" >> $GITHUB_STEP_SUMMARY
          echo "- Backend JAR build" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend distribution build" >> $GITHUB_STEP_SUMMARY
          echo "- Code coverage reports (Backend, Frontend, Performance, Python)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View artifacts in Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = `## 📊 CI/CD Pipeline Results
            
            | Component | Status |
            |-----------|--------|
            | Backend (Java/Maven) | ${{ needs.backend.result }} |
            | Frontend (Angular) | ${{ needs.frontend.result }} |
            | Performance (Maven) | ${{ needs.performance.result }} |
            | Test Generation (Python) | ${{ needs.test-generation-service.result }} |
            
            [View detailed logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true

  # ============================================================================
  # Documentation: Generate and publish docs to GitHub Pages (main/develop only)
  # ============================================================================
  documentation:
    needs: [ backend, frontend ]
    runs-on: ubuntu-latest
    name: Generate & Publish Documentation
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && needs.backend.result == 'success' && needs.frontend.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'sapmachine'
          cache: maven

      - name: Generate Frontend Documentation (Compodoc)
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps
          npx @compodoc/compodoc -p tsconfig.app.json -d ../docs/frontend --name "TAF UI" --disableGraph

      - name: Build Backend Artifacts
        working-directory: ./backend
        run: mvn clean package -DskipTests -q

      - name: Generate Backend JavaDoc
        working-directory: ./backend
        run: mvn javadoc:javadoc -DskipTests -Dmaven.javadoc.failOnError=false -q
        continue-on-error: true

      - name: Build Backend Docs Site
        shell: bash
        run: |
          mkdir -p docs/backend
          mkdir -p docs/backend/javadoc

          if [ -d backend/target/site/apidocs ]; then
            cp -r backend/target/site/apidocs/* docs/backend/javadoc/
          fi

          # Secondary attempt: generate JavaDoc directly with JDK tool if Maven output is missing.
          if [ ! -f docs/backend/javadoc/index.html ]; then
            mkdir -p docs/backend/javadoc
            SRC_FILES=$(find backend/src/main/java -name '*.java' | tr '\n' ' ')
            if [ -n "$SRC_FILES" ]; then
              javadoc -quiet -Xdoclint:none -encoding UTF-8 -source 17 -d docs/backend/javadoc $SRC_FILES || true
            fi
          fi

          # Fallback: ensure the javadoc URL always resolves even if generation failed.
          if [ ! -f docs/backend/javadoc/index.html ]; then
            {
              echo "<!DOCTYPE html>"
              echo "<html><head><meta charset=\"utf-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />"
              echo "<title>Référence Backend (mode simplifié)</title>"
              echo "<style>body{font-family:Arial,sans-serif;margin:24px}.card{border:1px solid #ddd;border-radius:8px;padding:16px;max-width:960px}code{background:#f5f5f5;padding:2px 4px;border-radius:4px}</style>"
              echo "</head><body><div class=\"card\">"
              echo "<h1>Référence Backend (mode simplifié)</h1>"
              echo "<p>La génération JavaDoc standard n'a pas abouti pour ce build. Cette page fournit une référence statique des classes backend publiées.</p>"
              echo "<p><a href=\"../index.html\">Retour à la documentation backend</a></p>"
              echo "<h2>Classes détectées</h2><ul>"
              find backend/src/main/java -name '*.java' | sort | while read -r file; do
                rel="${file#backend/src/main/java/}"
                echo "<li><code>${rel}</code></li>"
              done
              echo "</ul>"
              echo "</div></body></html>"
            } > docs/backend/javadoc/index.html

          fi

          # Build a simple endpoint catalog from controller annotations.
          # This is static and works even when the backend app is not running.
          {
            echo "<h2>Endpoints détectés (scan statique)</h2>"
            echo "<ul>"
            grep -R --include='*.java' -nE '@(Get|Post|Put|Delete|Patch)Mapping|@RequestMapping' backend/src/main/java | \
              sed -E 's#^backend/src/main/java/##' | \
              sed -E 's#([0-9]+):#(ligne \1): #' | \
              sed -E 's#@#<code>@#' | \
              sed -E 's#$#</code>#' | \
              sed -E 's#^#<li>#' | \
              sed -E 's#$#</li>#'
            echo "</ul>"
          } > docs/backend/endpoints.html

          cat > docs/backend/index.html <<'HTML_BACKEND_INDEX'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Documentation Backend TAF</title>
            <style>
              :root {
                --bg: #f6f8fb;
                --card: #ffffff;
                --text: #17202a;
                --muted: #4f5b66;
                --accent: #0a7ea4;
                --border: #d8e1e8;
              }
              body { margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); }
              .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
              .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
              h1 { margin-top: 0; }
              p { color: var(--muted); }
              a { color: var(--accent); text-decoration: none; }
              a:hover { text-decoration: underline; }
              .pill { display: inline-block; border: 1px solid var(--border); border-radius: 999px; padding: 6px 10px; margin-right: 8px; margin-bottom: 8px; background: #fff; }
            </style>
          </head>
          <body>
            <div class="wrap">
              <h1>Documentation API Backend</h1>

              <div class="card">
                <h2>OpenAPI / Swagger UI</h2>
                <p>Quand le backend tourne en local, la documentation interactive est disponible ici :</p>
                <div class="pill"><a href="http://localhost:8080/swagger-ui.html">http://localhost:8080/swagger-ui.html</a></div>
              </div>

              <div class="card">
                <h2>API Java (JavaDoc)</h2>
                <p>Générée à partir du code source pendant la CI.</p>
                <div class="pill"><a href="./javadoc/index.html">Ouvrir JavaDoc</a></div>
              </div>

              <div class="card">
                <h2>Catalogue des routes</h2>
                <p>Scan statique des annotations de contrôleurs dans le code source.</p>
                <div class="pill"><a href="./endpoints.html">Voir le catalogue des endpoints</a></div>
              </div>
            </div>
          </body>
          </html>
          HTML_BACKEND_INDEX

          # Backward compatibility for old links pointing to backend/README.md.
          cat > docs/backend/README.md <<'MD_BACKEND_README'
          # Documentation Backend déplacée

          Cette page a été déplacée vers le nouveau site de documentation backend :

          - [Ouvrir la documentation backend](./index.html)
          - [Ouvrir le catalogue des endpoints](./endpoints.html)
          - [Ouvrir JavaDoc](./javadoc/index.html)
          MD_BACKEND_README

      - name: Create Documentation Index
        shell: bash
        run: |
          GENERATED_AT="$(date -u '+%Y-%m-%d %H:%M UTC')"
          cat > docs/index.html <<HTML_MAIN_INDEX
          <!DOCTYPE html>
          <html>
          <head>
            <title>TAF - Documentation</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; }
              h1 { color: #333; }
              .doc-link { display: block; margin: 10px 0; padding: 10px; background: #f0f0f0; text-decoration: none; border-radius: 5px; }
              .doc-link:hover { background: #e0e0e0; }
            </style>
          </head>
          <body>
            <h1>Test Automation Framework - Documentation</h1>
            <h2>Composants</h2>
            <a href="./frontend/index.html" class="doc-link">📱 Frontend (Angular) - Documentation des composants et services</a>
            <a href="./backend/index.html" class="doc-link">🔌 Backend (Java/Spring) - API, JavaDoc et routes</a>
            <hr>
            <p>Généré le : ${GENERATED_AT}</p>
          </body>
          </html>
          HTML_MAIN_INDEX

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

      - name: Echo Documentation URL
        run: |
          echo "📚 Documentation deployed to GitHub Pages"
          echo "URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
