networks:
  taf-local:
    driver: bridge

volumes:
  mongodb-data:

services:
  # ============================================
  # DATABASE LAYER
  # ============================================

  mongodb:
    image: mongo:latest
    container_name: taf-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongodb-data:/data/db
    networks:
      - taf-local
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # TESTING BACKEND - TEAM 3 (TEST-PERFORMANCE-SERVICE)
  # ============================================

  backend-team3:
    build:
      dockerfile: ./Dockerfile.local
    container_name: taf-backend-team3
    restart: unless-stopped
    ports:
      - '8085:8080'
    environment:
      SPRING_APPLICATION_NAME: team3
      SERVER_PORT: 8080
      DB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=admin
      DB_AUTH: ${MONGO_ROOT_USERNAME}
      DB_NAME: ${MONGO_DB_NAME}
      API_TEST_TOKEN: ${JWT_SECRET}
      API_TEST_EXP_TIME: 86400000
      EUREKA_CLIENT_ENABLED: 'false'
      SELENIUM_URL: http://selenium-team3
      SELENIUM_PORT: 4444
      API_TEST_URL: http://testapi-team3
      API_TEST_PORT: 8080
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taf-local
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/actuator/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period:
        90s

        # ============================================
  # TEST GENERATION SERVICE - TEAM 3 (PYTHON + BAML)
  # ============================================

  test-generation-team3:
    build:
      dockerfile: ./test-generation-service/Dockerfile
    container_name: taf-test-generation-team3
    restart: unless-stopped
    ports:
      - '8096:8090'
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - taf-local
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8090/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # SELENIUM GRID - TEAM 3
  # ============================================

  selenium-team3:
    image: selenium/standalone-chrome:latest
    container_name: taf-selenium-team3
    restart: unless-stopped
    ports:
      - '4446:4444'
      - '7902:7900'
    shm_size: 2gb
    networks:
      - taf-local
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4444/status']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # FRONTEND - TEAM 3 (TEST-PERFORMANCE-SERVICE)
  # ============================================

  frontend-team3:
    build:
      dockerfile: ./frontend/Dockerfile
    container_name: taf-frontend-team3
    restart: unless-stopped
    ports:
      - '4400:80'
    environment:
      API_BASE_URL: http://backend-team3:8080
    depends_on:
      - backend-team3
    networks:
      - taf-local
