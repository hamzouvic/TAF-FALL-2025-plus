# SonarCloud Configuration for TAF (Test Automation Framework)
# This file defines the SonarCloud project settings for multi-module analysis

sonar.projectKey=HamzaAfif_TAF-FALL-2025
sonar.projectName=Test Automation Framework
sonar.organization=hamzaafif
sonar.projectVersion=1.0.0-SNAPSHOT

# Main source code paths (all modules)
sonar.sources=backend/src/main/java,performance/gatling/src/main/java,performance/jmeter/src/main/java,frontend/src,test-generation-service/app

# Test source code paths (all modules)
sonar.tests=backend/src/test/java,performance/jmeter/src/test/java,frontend/src,test-generation-service/tests
sonar.test.inclusions=backend/src/test/java/**/*.java,performance/jmeter/src/test/java/**/*.java,frontend/src/**/*.spec.ts,test-generation-service/tests/**/*.py

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml,performance/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=test-generation-service/coverage.xml

# Java bytecode paths required by Sonar Java analyzer
sonar.java.binaries=backend/target/classes,performance/gatling/target/classes,performance/jmeter/target/classes

# Scanner behavior
sonar.qualitygate.wait=false

# Analysis exclusions (non-production/generated/build output)
sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/build/**,**/coverage/**,**/.scannerwork/**,docs/**

# Coverage exclusions: keep only structural/boilerplate classes outside business logic.
sonar.coverage.exclusions=backend/src/main/java/**/entity/**,backend/src/main/java/**/dto/**,backend/src/main/java/**/config/**,backend/src/main/java/**/security/**,backend/src/main/java/**/payload/**,backend/src/main/java/**/repository/**,backend/src/main/java/**/apiCommunication/**,backend/src/main/java/**/TestAutomationFrameworkApplication.java,performance/gatling/src/main/java/**,performance/jmeter/src/main/java/**,frontend/src/environments/**,frontend/src/main.ts,frontend/src/polyfills.ts,frontend/src/app/**/*.module.ts,frontend/src/app/app-routing.module.ts,frontend/src/app/models/**,frontend/src/app/selenium/**,frontend/src/app/board-admin/**,frontend/src/app/board-user/**,frontend/src/app/busy-spinner/**,frontend/src/app/home/**,frontend/src/app/interface-test-api/**,frontend/src/app/login/**,frontend/src/app/performance-test-api/**,frontend/src/app/profile/**,frontend/src/app/project/**,frontend/src/app/register/**,frontend/src/app/app.component.ts,frontend/src/app/_services/auth.service.ts,frontend/src/app/_services/test-api.service.ts,frontend/src/app/_services/token-storage.service.ts,test-generation-service/app/__init__.py
