# SonarCloud Configuration for TAF (Test Automation Framework)
# This file defines the SonarCloud project settings for multi-module analysis

sonar.projectKey=HamzaAfif_TAF-FALL-2025
sonar.projectName=Test Automation Framework
sonar.organization=hamzaafif
sonar.projectVersion=1.0.0-SNAPSHOT

# Main source code paths (backend)
sonar.sources=backend/src/main/java

# Test source code paths
sonar.tests=backend/src/test/java
sonar.test.inclusions=backend/src/test/java/**/*.java

# Backend coverage (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# Java bytecode paths required by Sonar Java analyzer
sonar.java.binaries=backend/target/classes

# Scanner behavior
sonar.qualitygate.wait=false

# Analysis exclusions (non-production/generated/build output)
sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/build/**,**/coverage/**,**/.scannerwork/**,docs/**

# Keep exclusions minimal to avoid artificially inflated coverage.
sonar.coverage.exclusions=backend/src/main/java/ca/etsmtl/taf/TestAutomationFrameworkApplication.java
