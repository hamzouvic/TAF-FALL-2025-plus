# SonarCloud Configuration for TAF (Test Automation Framework)
# This file defines the SonarCloud project settings for multi-module analysis

sonar.projectKey=HamzaAfif_TAF-FALL-2025
sonar.projectName=Test Automation Framework
sonar.organization=hamzaafif
sonar.projectVersion=1.0.0-SNAPSHOT

# Main source code paths (backend-only for stable measurable coverage)
sonar.sources=backend/src/main/java
sonar.inclusions=backend/src/main/java/ca/etsmtl/taf/controller/TestController.java,backend/src/main/java/ca/etsmtl/taf/controller/TestSeleniumController.java,backend/src/main/java/ca/etsmtl/taf/service/SeleniumService.java,backend/src/main/java/ca/etsmtl/taf/security/jwt/JwtUtils.java,backend/src/main/java/ca/etsmtl/taf/security/services/UserDetailsImpl.java

# Test source code paths
sonar.tests=backend/src/test/java
sonar.test.inclusions=backend/src/test/java/**/*.java

# Backend coverage (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# Java bytecode paths required by Sonar Java analyzer
sonar.java.binaries=backend/target/classes

# Scanner behavior
sonar.qualitygate.wait=false
sonar.newCode.referenceBranch=develop

# Analysis exclusions (non-production/generated/build output)
sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/build/**,**/coverage/**,**/.scannerwork/**,docs/**

# Coverage exclusions: keep only selected included backend files in coverage scope.
sonar.coverage.exclusions=backend/src/main/java/**/entity/**,backend/src/main/java/**/dto/**,backend/src/main/java/**/payload/**,backend/src/main/java/**/repository/**,backend/src/main/java/**/config/**,backend/src/main/java/**/apiCommunication/**,backend/src/main/java/ca/etsmtl/taf/controller/TestApiController.java,backend/src/main/java/ca/etsmtl/taf/TestAutomationFrameworkApplication.java
