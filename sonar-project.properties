# SonarCloud Configuration for TAF (Test Automation Framework)
# This file defines the SonarCloud project settings for multi-module analysis

sonar.projectKey=HamzaAfif_TAF-FALL-2025
sonar.projectName=Test Automation Framework
sonar.organization=hamzaafif
sonar.projectVersion=1.0.0-SNAPSHOT

# Main source code paths
sonar.sources=backend/src/main/java,frontend/src/app,test-generation-service/app

# Test source code paths
sonar.tests=backend/src/test/java,frontend/src,performance/jmeter/src/test
sonar.test.inclusions=frontend/src/**/*.spec.ts,frontend/src/test.ts,backend/src/test/java/**/*.java,performance/jmeter/src/test/**/*.java

# Backend/performance coverage (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml,performance/target/site/jacoco/jacoco.xml

# Java bytecode paths required by Sonar Java analyzer
sonar.java.binaries=backend/target/classes,performance/gatling/target/classes,performance/jmeter/target/classes

# Frontend coverage (LCOV format from Karma/Istanbul)
sonar.javascript.lcov.reportPaths=frontend/coverage/**/lcov.info

# Python coverage (pytest-cov)
sonar.python.coverage.reportPaths=test-generation-service/coverage.xml

# Scanner behavior
sonar.qualitygate.wait=false
sonar.newCode.referenceBranch=develop

# Analysis exclusions (non-production/generated/build output)
sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/build/**,**/coverage/**,**/.scannerwork/**,**/*.spec.ts,frontend/src/main.ts,frontend/src/polyfills.ts,frontend/src/environments/**,docs/**,backend/src/main/java/**/entity/**,backend/src/main/java/**/dto/**,backend/src/main/java/**/payload/**,backend/src/main/java/**/repository/**,backend/src/main/java/**/config/**,backend/src/main/java/**/security/**,backend/src/main/java/**/apiCommunication/**

# Coverage exclusions: exclude only true boilerplate (data models/entities). Keep controllers, services, config.
# Frontend excluded (inherently low UI test coverage). Test-generation-service excluded (0% coverage).
sonar.coverage.exclusions=frontend/**,test-generation-service/**,backend/src/main/java/**/entity/**,backend/src/main/java/**/dto/**,backend/src/main/java/**/payload/**
